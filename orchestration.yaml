name: showcase
version: 1.0.0
team: showcase
strategy: fan-out-fan-in

agents:
  - demo-claude-sdk
  - demo-openai-agents
  - demo-google-adk
  - demo-langgraph
  - demo-crewai

input:
  prompt: "What are the top 3 benefits of AI agents in enterprise?"

output:
  format: table
  columns:
    - framework
    - model
    - latency_ms
    - response_preview
  truncate_response: 120

timeout_seconds: 60
on_agent_failure: continue
