# infra/docker-compose.yml
services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: agentbreeder-jaeger
    networks:
      - agentbreeder-net
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

networks:
  agentbreeder-net:
    name: agentbreeder-net
    external: true
