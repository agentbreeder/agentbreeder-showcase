# agents/langgraph/agent.yaml
name: demo-langgraph
version: 1.0.0
team: showcase
owner: saha.rajit@gmail.com

framework: langgraph
model:
  primary: ollama/llama3.2
  fallback: ollama/llama3.1

knowledge_bases:
  - ref: technical-docs

deploy:
  cloud: local
  scaling:
    min: 1
    max: 3
  env_vars:
    OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    OPENTELEMETRY_ENDPOINT: "http://agentbreeder-jaeger:4317"
