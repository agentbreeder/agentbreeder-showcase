# agents/crewai/agent.yaml
name: demo-crewai
version: 1.0.0
team: showcase
owner: saha.rajit@gmail.com

access:
  visibility: public

framework: crewai
model:
  primary: claude-sonnet-4-6
  fallback: claude-sonnet-4-6

knowledge_bases:
  - ref: enterprise-docs

subagents:
  - ref: agents/demo-langgraph
    name: demo-langgraph
    description: "LangGraph agent for technical research and pattern analysis"
  - ref: agents/demo-claude-sdk
    name: demo-claude-sdk
    description: "Claude SDK agent for enterprise benefit synthesis"

deploy:
  cloud: local
  scaling:
    min: 1
    max: 3
  env_vars:
    ANTHROPIC_API_KEY: "secret://ANTHROPIC_API_KEY"
    OPENTELEMETRY_ENDPOINT: "http://agentbreeder-jaeger:4317"
    GOOGLE_CLOUD_PROJECT: "agentbreeder-cloud"
    GOOGLE_CLOUD_REGION: "us-central1"
    AWS_ACCOUNT_ID: "988745870276"
    AWS_REGION: "us-east-2"
    AWS_ECS_CLUSTER: "agentbreeder"
    AWS_ECR_REPO: "agentbreeder"
    AWS_EXECUTION_ROLE_ARN: "secret://AWS_EXECUTION_ROLE_ARN"
    AWS_VPC_SUBNETS: "secret://AWS_VPC_SUBNETS"
    AWS_SECURITY_GROUPS: "secret://AWS_SECURITY_GROUPS"
    AZURE_SUBSCRIPTION_ID: "secret://AZURE_SUBSCRIPTION_ID"
    AZURE_RESOURCE_GROUP: "agentbreeder-showcase"
    AZURE_LOCATION: "eastus"
    AZURE_CONTAINER_APPS_ENV: "agentbreeder-env"
    AZURE_REGISTRY: "agentbreeder"
